<!DOCTYPE html>
<html>
  <head>
    <title>Exercise 2j</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function App() {
        return(
          <> 
            <ProductDetails name="Cotton socks" imageSrc="cotton-socks.png" price ="10.90" discountPrice="5.45" image="cotton-socks.png"/>
            <ProductDetails name="Tennis balls" imageSrc="tennis-balls.png" price ="6.00"/>
            <ProductDetails name="Plain T-shirt" imageSrc="plain-t-shirt.png" price ="7.99"/>
          </>
        )
      }
      function ProductDetails({name, price, discountPrice, imageSrc}) {
        return(
          <>
            <img src={"../Images/"+imageSrc} width="50"/>
            <p>{name}</p>
            {
              discountPrice ? (
                <>
                  <del><p>Price: ${price}</p></del>
                  <p>Discount Price: ${discountPrice}</p>
                </>
              ) : (
                <>
                  <p>Price: ${price}</p>
                </>
              )

            }
            <div>
              <button>Add to Cart</button>
            </div>
          </>
        )
      }

      const container = document.querySelector('.js-container');
      const root = ReactDOM.createRoot(container);
      root.render(<App/>)
    </script>
  </body>
</html>
