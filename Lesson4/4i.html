<!DOCTYPE html>
<html>
  <head>
    <title>Exercise 4i</title>
    <style>
      body{
        font-family: Arial, Helvetica, sans-serif;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      button{
        background-color: rgb(25, 135, 84);
        padding: 8px 15px;
        color: white;
        border: none;
      }
      .counter-button, .reset-button{
        margin-right: 10px;
      }
      .container{
        background-color: rgb(222, 222, 222);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>

    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <script type="text/babel">
      function App(){
        const [count, setCount] = React.useState(0);
        const [isAuto,setIsAuto] = React.useState(true);
        const timeRef = React.useRef(null);
        const counterButton = React.useRef(null);
        function Counter(){
          setCount(count+1);
        }
        function resetButton(){
          setCount(0)
        }
        function autoClick(event){
          // Always save the element which you called using ref because they intialize 
          // before dom and they cant point to element. so event directly trigger after rendering they provide their intial value null
          const buttonElem = counterButton.current;

          if(isAuto){
            // timeRef.current before Set Interval save Set Interval Id so we can use to Clear Interval
            timeRef.current = 
              setInterval(() => {
                buttonElem.click();
              },1000);
            setIsAuto(false);
            event.target.innerText = 'Stop Auto Click';
          }
          else{
            clearInterval(timeRef.current);
            timeRef.current = null;
            setIsAuto(true);
            event.target.innerText = 'Auto Click';
          }
        }
        return(
          <div className="container">
            <button 
              className = "counter-button"
              onClick = {Counter}
              ref = {counterButton}
            >
              Clicked {
                count === 1 || count === 0 ? 
                  count + ' time' 
                :
                  count + ' times'
              }
            </button>
            <button className = "reset-button" onClick = {resetButton}>Reset</button>
            <button className = "auto-button" onClick = {autoClick}>Auto Click</button>
          </div>
        );
      }
      
      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App />);
    </script>
  </body>
</html>
